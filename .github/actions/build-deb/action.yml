name: 'Build Debian Package'
description: 'Build architecture-independent .deb for transitional package'

runs:
  using: 'composite'
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev debhelper build-essential

    - name: Generate changelog if missing
      shell: bash
      run: |
        if [ ! -f debian/changelog ]; then
          VERSION=$(cat VERSION)
          cat > debian/changelog <<EOF
        halos-mdns-publisher (${VERSION}-1) unstable; urgency=medium

          * Transitional package

         -- Matti Airas <matti.airas@hatlabs.fi>  $(date -R)
        EOF
        fi

    - name: Build Debian package
      shell: bash
      run: |
        dpkg-buildpackage -b -uc -us
        mv ../*.deb ./
        echo "Built packages:"
        ls -lh *.deb
